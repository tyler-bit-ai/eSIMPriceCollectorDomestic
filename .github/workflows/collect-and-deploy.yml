name: Collect And Deploy Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      run_status: ${{ steps.crawl.outputs.run_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyYAML playwright

      - name: Install Playwright Browser
        run: python -m playwright install chromium

      - name: Run Crawl
        id: crawl
        shell: bash
        run: |
          set +e
          python -m app crawl --registry config/source_registry.yml --out data
          exit_code=$?
          echo "crawl_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 0 ]; then
            echo "run_status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$exit_code" -eq 2 ]; then
            echo "run_status=partial_success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_status=failure" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Run Tests
        run: python -m pytest -q

      - name: Verify Dashboard Payload Exists
        shell: bash
        run: |
          test -f dashboard/data/latest.json
          test -f dashboard/index.html
          test -f dashboard/app.js
          test -f dashboard/styles.css

      - name: Upload Crawl Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs
          path: |
            data/failed.jsonl
            data/runs
            data/latest/run_metadata.json
          if-no-files-found: warn

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: collect
    if: ${{ needs.collect.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
